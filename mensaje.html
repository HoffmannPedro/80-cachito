<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Mensaje Especial | Festejo 80 años</title>
    <!-- Google Fonts: Playfair Display (Serif) & Montserrat (Sans-serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="mensaje-page-body">

    <!-- ================= MARCO DECORATIVO DE FONDO ART DECO ================= -->
    <div class="bg-art-frame" id="bg-art-frame">
        <span class="corner top-left"></span>
        <span class="corner top-right"></span>
        <span class="corner bottom-left"></span>
        <span class="corner bottom-right"></span>
    </div>

    <!-- ================= PANELES CORREDIZOS DE GALA ================= -->
    <div class="doors-wrapper" id="doors-wrapper">
        <div class="door-panel door-left"></div>
        <div class="door-panel door-right"></div>

        <!-- BOTÓN PLAY ART DECO CENTRAL -->
        <div class="art-deco-container" id="art-deco-container">
            <button class="art-deco-play-btn" id="btn-start-msg" aria-label="Abrir invitación y escuchar mensaje">
                <span class="outer-ring"></span>
                <span class="dashed-ring"></span>
                <svg viewBox="0 0 24 24" class="play-triangle" width="28" height="28" fill="currentColor">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </button>
            <span class="art-deco-label">TOCAR PARA ABRIR</span>
        </div>
    </div>

    <!-- ================= CONTENIDO REVELADO (GALERÍA DE ARTE) ================= -->
    <div class="gallery-content-wrapper" id="gallery-content-wrapper">

        <!-- Galería de Fotos (Cuadro de Museo Único con Paspartú) -->
        <div class="museum-gallery" id="museum-gallery">
            <div class="art-frame" id="frame-photo">
                <div class="art-frame-inner">
                    <img src="abuelo.jpg" alt="Cacho" onerror="hidePhotoFrame()">
                </div>
            </div>

            <!-- Fallback Monograma si no se sube la foto -->
            <div id="gallery-fallback" class="art-frame fallback-frame hidden">
                <div class="art-frame-inner">
                    <div class="photo-fallback-placeholder abuelo-fallback">
                        <span class="monogram">C</span>
                        <span class="age">80</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reproductor de Audio Minimalista de Trazo Fino -->
        <div class="minimal-player">
            <div class="player-btn-wrapper">
                <button id="btn-play-msg" class="minimal-play-btn" aria-label="Controlar reproducción">
                    <svg class="play-icon hidden" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg class="pause-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
            </div>
            <div class="minimal-player-body">
                <div class="minimal-progress-container" id="progress-bar-container">
                    <div class="minimal-progress-bar" id="audio-progress"></div>
                </div>
            </div>
        </div>

        <!-- Visualizador de Onda de Sonido Lineal -->
        <div class="minimal-wave" id="sound-wave">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

    </div>

    <!-- Audio Tag de Voz (Saludo principal) -->
    <audio id="cacho-audio" preload="auto">
        <source src="mensaje.flac" type="audio/flac">
        <source src="mensaje.mp3" type="audio/mpeg">
    </audio>

    <!-- Audio Tag de Música (Canción de fondo) -->
    <audio id="bg-music-audio" preload="auto">
        <source src="musica_mensaje.flac" type="audio/flac">
        <source src="musica_mensaje.mp3" type="audio/mpeg">
    </audio>


    <!-- Script de interacción y reproducción -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audioVoice = document.getElementById('cacho-audio');
            const audioBG = document.getElementById('bg-music-audio');
            
            const btnStart = document.getElementById('btn-start-msg');
            const btnPlay = document.getElementById('btn-play-msg');
            const playIcon = btnPlay.querySelector('.play-icon');
            const pauseIcon = btnPlay.querySelector('.pause-icon');
            const progressBar = document.getElementById('audio-progress');
            const progressContainer = document.getElementById('progress-bar-container');
            const soundWave = document.getElementById('sound-wave');
            const doorsWrapper = document.getElementById('doors-wrapper');
            const galleryWrapper = document.getElementById('gallery-content-wrapper');

            // Configurar volúmenes iniciales
            audioVoice.volume = 1.0; // Voz del abuelo al 100% de volumen
            audioBG.volume = 0.15;   // Música de fondo al 15% de volumen (suave)

            // 1. Apertura de puertas e inicio de audio dual
            btnStart.addEventListener('click', () => {
                // Disparar las transiciones CSS de apertura
                doorsWrapper.classList.add('doors-opened');
                galleryWrapper.classList.add('revealed');
                document.getElementById('bg-art-frame').classList.add('revealed');

                // Reproducir canción de fondo (rige la barra de progreso)
                audioBG.play()
                    .then(() => {
                        updatePlayerUI(true);
                    })
                    .catch(err => {
                        console.warn("Autoplay de música bloqueado:", err);
                        updatePlayerUI(false);
                    });

                // Reproducir voz de Cacho
                audioVoice.play().catch(err => {
                    console.warn("Autoplay de voz bloqueado:", err);
                });
            });

            // 2. Controles de Play/Pause del reproductor compacto (Sincronizados)
            btnPlay.addEventListener('click', () => {
                if (audioBG.paused) {
                    audioBG.play()
                        .then(() => {
                            updatePlayerUI(true);
                        })
                        .catch(err => {
                            console.error("Error al reproducir música de fondo:", err);
                        });
                    
                    // Solo reproducimos la voz si no ha finalizado su duración
                    if (audioVoice.currentTime < audioVoice.duration) {
                        audioVoice.play().catch(err => {
                            console.warn("Error al reanudar voz:", err);
                        });
                    }
                } else {
                    audioBG.pause();
                    audioVoice.pause();
                    updatePlayerUI(false);
                }
            });

            function updatePlayerUI(isPlaying) {
                if (isPlaying) {
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                    soundWave.classList.add('playing');
                } else {
                    playIcon.classList.remove('hidden');
                    pauseIcon.classList.add('hidden');
                    soundWave.classList.remove('playing');
                }
            }

            // 3. Sincronización y progreso (Conducidos exclusivamente por la VOZ del abuelo)
            audioVoice.addEventListener('timeupdate', () => {
                // Actualizar barra en base a la voz de Cacho únicamente
                if (audioVoice.duration) {
                    const progress = (audioVoice.currentTime / audioVoice.duration) * 100;
                    progressBar.style.width = `${progress}%`;
                }

                // Mantener sincronizada la música de fondo con el tiempo de la voz
                if (!audioVoice.paused && !audioBG.paused) {
                    if (Math.abs(audioBG.currentTime - audioVoice.currentTime) > 0.5) {
                        audioBG.currentTime = audioVoice.currentTime;
                    }
                }
            });

            // Al finalizar la voz, la barra de progreso queda en 100% fija.
            // La música de fondo (audioBG) sigue sonando sola.
            audioVoice.addEventListener('ended', () => {
                console.log("Mensaje de voz de Cacho finalizado. Continúa la música de fondo.");
                progressBar.style.width = '100%';
            });

            // 4. Atenuación / Ducking del volumen de la música de fondo
            audioBG.addEventListener('timeupdate', () => {
                // El mensaje termina a los 58 segundos (duración de la voz)
                const voiceDuration = (audioVoice.duration && !isNaN(audioVoice.duration)) ? audioVoice.duration : 58;
                if (audioBG.currentTime >= voiceDuration) {
                    // Si la música supera la duración de la voz, subimos el volumen al 35% para llenar el vacío
                    fadeBGVolume(0.35);
                } else {
                    // Si está dentro del saludo hablado, bajamos el volumen al 15% para que se entienda la voz
                    fadeBGVolume(0.15);
                }
            });

            function fadeBGVolume(target) {
                const step = 0.02; // Suavidad de la transición del volumen
                const current = audioBG.volume;
                if (Math.abs(current - target) < 0.01) {
                    audioBG.volume = target;
                    return;
                }
                if (current < target) {
                    audioBG.volume = Math.min(1.0, current + step);
                } else {
                    audioBG.volume = Math.max(0.0, current - step);
                }
            }

            // Al finalizar la canción de fondo (que es el fin real de la experiencia), reseteamos todo
            audioBG.addEventListener('ended', () => {
                updatePlayerUI(false);
                progressBar.style.width = '0%';
                audioBG.currentTime = 0;
                audioVoice.currentTime = 0;
                audioVoice.pause();
            });

            // Barra de progreso interactiva (Scrubbing sobre la voz)
            progressContainer.addEventListener('click', (e) => {
                const width = progressContainer.clientWidth;
                const clickX = e.offsetX;
                const duration = audioVoice.duration;
                
                if (duration) {
                    const targetTime = (clickX / width) * duration;
                    audioVoice.currentTime = targetTime;
                    
                    // Sincronizar la música de fondo al mismo punto de la voz
                    if (targetTime < audioBG.duration) {
                        audioBG.currentTime = targetTime;
                    }
                    
                    // Actualizar barra de forma inmediata
                    progressBar.style.width = `${(clickX / width) * 100}%`;
                    
                    // Si el reproductor está activo y retrocedemos a un punto donde la voz debe oírse, la reanudamos
                    if (!audioBG.paused) {
                        if (targetTime < duration) {
                            if (audioVoice.paused) {
                                audioVoice.play().catch(e => console.warn(e));
                            }
                        } else {
                            audioVoice.pause();
                        }
                    }
                }
            });
        });

        // 4. Control dinámico de la foto (Se ejecuta ante error de carga)
        function hidePhotoFrame() {
            document.getElementById('frame-photo').style.display = 'none';
            document.getElementById('gallery-fallback').classList.remove('hidden');
        }
    </script>
</body>

</html>
